name: Generate Patched Bazzite Build
on:
  push:
    paths:
      - "version.txt"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write 

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    outputs:
      fedora_version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Read version from file
        id: set-version
        run: echo "version=$(cat version.txt | tr -d '\n')" >> $GITHUB_OUTPUT

  compile:
    needs: build-kernel
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ needs.build-kernel.outputs.fedora_version }}
      options: --privileged
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Patched RPMs
        run: |
          dnf install -y fedpkg fedora-packager rpmdevtools ncurses-devel hmaccalc \
                         binutils-devel elfutils-libelf-devel openssl-devel wget xz bison flex \
                         pahole perl-devel perl-generators rust rust-src rustfmt bindgen clippy \
                         gcc-c++ glibc-static hostname kernel-rpm-macros lvm2 \
                         net-tools nss-tools openssl pesign python3-devel \
                         systemd-boot-unsigned systemd-ukify tpm2-tools which dracut elfutils-devel \
                         dosfstools e2fsprogs xfsprogs

          rpmdev-setuptree
          dnf download --source kernel
          rpm -i kernel-*.src.rpm
          
          cd ~/rpmbuild/SPECS
          wget https://raw.githubusercontent.com/WoodyWoodster/mac80211-mcs-patch/main/skip-basic-mcs-check.patch -O ~/rpmbuild/SOURCES/skip-basic-mcs-check.patch
          sed -i '/Patch0:/a Patch9999: skip-basic-mcs-check.patch' kernel.spec
          
          sed -i 's/%define with_debug    1/%define with_debug    0/' kernel.spec
          sed -i 's/%define with_debuginfo 1/%define with_debuginfo 0/' kernel.spec
          
          rpmbuild -bb --target=x86_64 --with baseonly --without debuginfo --without debug kernel.spec
          
          mkdir -p $GITHUB_WORKSPACE/output
          cp ~/rpmbuild/RPMS/x86_64/*.rpm $GITHUB_WORKSPACE/output/

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched-kernel
          path: output/*.rpm

  bluebuild:
    name: Build Custom Image
    needs: [build-kernel, compile]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recipe: [recipe.yml]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Patched Kernel
        uses: actions/download-artifact@v4
        with:
          name: patched-kernel
          path: ./files/kernel-rpms

      - name: Inject version number
        run: |
          VERSION=$(cat version.txt | tr -d '\n')
          TARGET_FILE="${{ github.workspace }}/recipes/recipe.yml"
          
          echo "Injecting $VERSION into $TARGET_FILE..."
          
          if [ -f "$TARGET_FILE" ]; then
            sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" "$TARGET_FILE"
            head -n 15 "$TARGET_FILE"
          else
            echo "Error: $TARGET_FILE not found!"
            ls -R ${{ github.workspace }}
            exit 1
          fi

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }} 
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true
