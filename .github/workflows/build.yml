name: Generate Kmod
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-version:
    name: Check for New Bazzite Release
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      tag: ${{ steps.compare.outputs.tag }}
    steps:
      - name: Compare Versions
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          podman pull ghcr.io/ublue-os/bazzite:latest
          BAZZITE_VER=$(podman run --rm ghcr.io/ublue-os/bazzite:latest bash -c 'source /etc/os-release && echo ${OSTREE_VERSION}')
          
          if [ -z "$BAZZITE_VER" ]; then
            echo "Failed to retrieve Bazzite version."
            exit 1
          fi
          
          LATEST_RELEASE=$(gh release view --json tagName -q ".tagName" 2>/dev/null || echo "none")
          
          echo "Upstream Bazzite Version: $BAZZITE_VER"
          echo "Local Latest Release: $LATEST_RELEASE"
          
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]] || [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=${BAZZITE_VER}-r${{ github.run_number }}" >> $GITHUB_OUTPUT
          elif echo "$LATEST_RELEASE" | grep -q "^$BAZZITE_VER"; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=${BAZZITE_VER}-r${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

  build-carrier:
    name: Build Carrier Image
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.check-version.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Prepare Public Key
        run: |
          echo "${{ secrets.MOK_PUBLIC_KEY }}" > signing_key.x509

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Carrier (Podman)
        env:
          MOK_PRIVATE_KEY: ${{ secrets.MOK_PRIVATE_KEY }}
        run: |
          TAG=${{ needs.check-version.outputs.tag }}
          REPO=ghcr.io/${{ github.repository_owner }}/mac80211-carrier
          
          podman build \
            --build-arg BAZZITE_VERSION=latest \
            --build-arg BUILD_TAG=$TAG \
            --secret id=mok_priv,env=MOK_PRIVATE_KEY \
            -f Containerfile.in \
            -t $REPO:latest \
            -t $REPO:$TAG .
          
          podman push $REPO:latest
          podman push $REPO:$TAG

  bluebuild:
    name: Build Custom Image
    needs: [check-version, build-carrier]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true

  create-release:
    name: Create GitHub Release
    needs: [check-version, bluebuild]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Release ${{ needs.check-version.outputs.tag }}
          body: |
            Automated build of the patched mac80211 kernel module for Bazzite.
            Target Kernel: Latest Bazzite Stable
          generate_release_notes: true
