name: Generate Kmod
on:
  push:
    branches:
      - akmod # Change this to your primary branch name if different
  workflow_dispatch:

jobs:
  build-carrier:
    name: Build Carrier Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Prepare Keys
        run: |
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > signing_key.priv
          echo "${{ secrets.MOK_PUBLIC_KEY }}" > signing_key.x509

      - name: Build and Push Carrier
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile.in
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mac80211-carrier:latest
          build-args: |
            BAZZITE_VERSION=latest

  bluebuild:
    name: Build Custom Image
    needs: build-carrier
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: recipes/recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true
