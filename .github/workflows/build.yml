name: Generate Patched Bazzite Build
on:
  # push:
  #   paths:
  #     - "version.txt"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write 

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recipe: [recipe.yml]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Compile Kernel Module RPM
        env:
          MOK_PRIV: ${{ secrets.MOK_PRIVATE_KEY }}
          MOK_X509: ${{ secrets.MOK_PUBLIC_KEY }}
        run: |
          echo "$MOK_PRIV" > signing_key.priv
          echo "$MOK_X509" > signing_key.x509
          
          mkdir -p rpms rpmbuild
          
          podman run --rm -v ${{ github.workspace }}:/work -w /work ghcr.io/ublue-os/bazzite:latest bash -c "
            KVER=\$(rpm -q kernel-core --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | head -n 1)
            dnf install -y --nogpgcheck rpm-build make gcc kernel-devel-\$KVER curl xz openssl
            
            rpmbuild -bb spec_files/mcspatched_mac80211/mcspatched_mac80211.spec \
              --define '_topdir /work/rpmbuild' \
              --define '_rpmdir /work/rpms' \
              --define 'mok_priv /work/signing_key.priv' \
              --define 'mok_x509 /work/signing_key.x509'
          "
          
          find rpms/ -name '*.rpm' -exec mv {} rpms/ \;
          rm signing_key.priv signing_key.x509

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }} 
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true
