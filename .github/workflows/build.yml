name: Generate Kmod
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-carrier:
    name: Build Carrier Image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.generate_tag.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Generate Tag
        id: generate_tag
        run: echo "tag=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Prepare Public Key
        run: |
          echo "${{ secrets.MOK_PUBLIC_KEY }}" > signing_key.x509

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Carrier (Podman)
        env:
          MOK_PRIVATE_KEY: ${{ secrets.MOK_PRIVATE_KEY }}
        run: |
          TAG=${{ steps.generate_tag.outputs.tag }}
          REPO=ghcr.io/${{ github.repository_owner }}/mac80211-carrier
          
          podman build \
            --build-arg BAZZITE_VERSION=latest \
            --build-arg BUILD_TAG=$TAG \
            --secret id=mok_priv,env=signing_key.priv \
            -f Containerfile.in \
            -t $REPO:latest \
            -t $REPO:$TAG .
          
          podman push $REPO:latest
          podman push $REPO:$TAG

  bluebuild:
    name: Build Custom Image
    needs: build-carrier
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true

  create-release:
    name: Create GitHub Release
    needs: build-carrier
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Public Key
        run: echo "${{ secrets.MOK_PUBLIC_KEY }}" > signing_key.x509

      - name: Extract RPM from Carrier
        run: |
          TAG=${{ needs.build-carrier.outputs.tag }}
          REPO=ghcr.io/${{ github.repository_owner }}/mac80211-carrier
          
          podman pull $REPO:$TAG
          podman create --name temp_carrier $REPO:$TAG true
          podman cp temp_carrier:/rpms/mac80211-kmod.rpm .
          podman rm temp_carrier

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-carrier.outputs.tag }}
          name: Release ${{ needs.build-carrier.outputs.tag }}
          body: |
            Automated build of the patched mac80211 kernel module for Bazzite.
            Target Kernel: Latest Bazzite Stable
          files: |
            mac80211-kmod.rpm
            signing_key.x509
          generate_release_notes: true
