name: Generate Kmod
on:
  push:
    branches:
      - akmod
  workflow_dispatch:

jobs:
  build-carrier:
    name: Build Carrier Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Prepare Keys
        run: |
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > signing_key.priv
          echo "${{ secrets.MOK_PUBLIC_KEY }}" > signing_key.x509

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Carrier (Podman)
        run: |
          # Podman handles deep layer stacks better than Docker on GH Actions
          podman build \
            --build-arg BAZZITE_VERSION=latest \
            -f Containerfile.in \
            -t ghcr.io/${{ github.repository_owner }}/mac80211-carrier:latest .
          
          podman push ghcr.io/${{ github.repository_owner }}/mac80211-carrier:latest

  bluebuild:
    name: Build Custom Image
    needs: build-carrier
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true
  create-release:
      name: Create GitHub Release
      needs: build-carrier
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - name: Checkout
          uses: actions/checkout@v6
  
        - name: Extract RPM from Carrier
          run: |
            podman pull ghcr.io/${{ github.repository_owner }}/mac80211-carrier:latest
            podman run --rm -v .:/out ghcr.io/${{ github.repository_owner }}/mac80211-carrier:latest cp /rpms/mac80211-kmod.rpm /out/
  
        - name: Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: latest-build
            files: mac80211-kmod.rpm
