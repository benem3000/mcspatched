name: Check Version Alignment
on:
  schedule:
    - cron: "0 0,12 * * *" # Runs every 12 hours
  workflow_dispatch: 

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Get OS and Kernel Versions
        id: check
        run: |
          podman pull ghcr.io/ublue-os/bazzite:latest
          KVER=$(podman run --rm ghcr.io/ublue-os/bazzite:latest rpm -q kernel-core --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}' | head -n 1)
          FEDORA_VER=$(podman run --rm ghcr.io/ublue-os/bazzite:latest bash -c 'source /etc/os-release && echo $VERSION_ID')
          
          echo "kver=$KVER" >> $GITHUB_OUTPUT
          echo "fedora_ver=$FEDORA_VER" >> $GITHUB_OUTPUT

      - name: Compare and Notify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_MAJOR=$(cat version.txt 2>/dev/null | tr -d '\n' || echo "0")
          CURRENT_KERNEL=$(cat kernel.txt 2>/dev/null | tr -d '\n' || echo "0")
          
          NEW_MAJOR=${{ steps.check.outputs.fedora_ver }}
          NEW_KERNEL=${{ steps.check.outputs.kver }}

          if [ "$NEW_KERNEL" != "$CURRENT_KERNEL" ] || [ "$NEW_MAJOR" != "$CURRENT_MAJOR" ]; then
            echo "Update detected! Kernel: $NEW_KERNEL, Fedora: $NEW_MAJOR"
            
            echo "$NEW_MAJOR" > version.txt
            echo "$NEW_KERNEL" > kernel.txt

            # Write the NEW recipe format for the Carrier Image workflow
            printf "%s\n" \
              "# yaml-language-server: \$schema=https://schema.blue-build.org/recipe-v1.json" \
              "name: mcspatched-bazzite" \
              "description: Bazzite with a toggleable mac80211 MCS validation patch." \
              "" \
              "base-image: ghcr.io/ublue-os/bazzite" \
              "image-version: $NEW_MAJOR" \
              "" \
              "modules:" \
              "  - type: copy" \
              "    from: ghcr.io/${{ github.repository_owner }}/mac80211-carrier:latest" \
              "    src: /rpms/mac80211-kmod.rpm" \
              "    dest: /tmp/mac80211-kmod.rpm" \
              "" \
              "  - type: rpm-ostree" \
              "    install:" \
              "      - /tmp/mac80211-kmod.rpm" \
              > recipes/recipe.yml

            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add version.txt kernel.txt recipes/recipe.yml
            git commit -m "chore: update build for kernel $NEW_KERNEL"
            git push

            gh workflow run build.yml
          else
            echo "No update required."
          fi
