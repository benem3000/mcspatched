name: Check Version Alignment
on:
  schedule:
    - cron: "0 0 * * *" # Runs once a day at midnight UTC
  workflow_dispatch: 

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Get Latest Fedora Version
        id: fedora
        run: |
          FEDORA_VER=$(curl -s https://fedoraproject.org/releases.json | jq -r '[.[] | .version | select(test("^[0-9]+$"))] | map(tonumber) | max')
          echo "latest_fedora=$FEDORA_VER" >> $GITHUB_OUTPUT

      - name: Get Latest Bazzite Base Version
        id: bazzite
        run: |
          BAZZITE_VER=$(skopeo inspect docker://ghcr.io/ublue-os/bazzite:latest | jq -r '.Labels["org.opencontainers.image.version"]' | cut -d. -f1)
          echo "latest_bazzite=$BAZZITE_VER" >> $GITHUB_OUTPUT

      - name: Compare and Notify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_V_FILE=$(cat version.txt | tr -d '\n')
          NEW_FEDORA=${{ steps.fedora.outputs.latest_fedora }}
          NEW_BAZZITE=${{ steps.bazzite.outputs.latest_bazzite }}

          if [ "$NEW_FEDORA" == "$NEW_BAZZITE" ] && [ "$NEW_FEDORA" != "$CURRENT_V_FILE" ]; then
            echo "Alignment detected! Updating to Fedora $NEW_FEDORA."
            echo "$NEW_FEDORA" > version.txt

            printf "%s\n" \
              "---" \
              "# yaml-language-server: \$schema=https://schema.blue-build.org/recipe-v1.json" \
              "name: bazzite-AX210-test" \
              "description: MCS patched bazzite." \
              "" \
              "base-image: ghcr.io/ublue-os/bazzite" \
              "image-version: \"$NEW_FEDORA\"" \
              "" \
              "modules:" \
              "  - type: files" \
              "    files:" \
              "      - source: system" \
              "        destination: /" \
              "      - source: kernel-rpms" \
              "        destination: /tmp/kernel-rpms" \
              "" \
              "  - type: script" \
              "    snippets:" \
              "      - |" \
              "        echo \"Swapping to Patched AX210 Kernel...\"" \
              "        rpm-ostree override replace /tmp/kernel-rpms/*.rpm" \
              "" \
              "        echo \"Cleaning up RPMs to save space...\"" \
              "        rm -rf /tmp/kernel-rpms" \
              "  - type: signing" \
              > recipes/recipe.yml

            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add version.txt recipes/recipe.yml
            git commit -m "chore: update version to $NEW_FEDORA"
            git push

            # This tells GitHub to start the build-kernel job immediately
            echo "Manually triggering the main build..."
            gh workflow run build.yml
          else
            echo "No update required at this time."
          fi
