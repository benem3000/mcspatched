---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: rpm-ostree
    install:
      - kernel-devel  # Required for headers
      - gcc
      - make
      - patch
      - curl
      - xz

  - type: script
    scripts:
      - build-mac80211.sh

  # Optional: Copy the config to enable the toggle by default
  - type: copy
    src: files/mac80211.conf
    dest: /etc/modprobe.d/mac80211.conf

  # Cleanup: Remove build tools to keep the image small
  - type: rpm-ostree
    remove:
      - kernel-devel
      - gcc
      - make
