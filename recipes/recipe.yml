---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: bazzite-AX210-test
# description will be included in the image's metadata
description: MCS patched bazzite.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43 # latest is also supported if you want new updates ASAP

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - micro
        - starship
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user

  - type: signing

  - type: script
    snippets:
      - |
        echo "Swapping to Patched AX210 Kernel..."
        rpm-ostree override replace \
          ./kernel-rpms/kernel-core-*.rpm \
          ./kernel-rpms/kernel-modules-*.rpm \
          ./kernel-rpms/kernel-modules-extra-*.rpm
