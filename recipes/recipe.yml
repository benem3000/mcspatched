# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: mcpatched-bazzite
description: Bazzite with a toggleable mac80211 MCS validation patch for Xfinity XB8 compatibility.

base-image: ghcr.io/ublue-os/bazzite
image-version: 43

modules:
  - type: akmods
    name: mac80211-patched
    base-packages:
      - kernel-devel
    build-packages:
      - gcc
      - make
      - patch
    # This points to the patch we created in Step 1
    patches:
      - mac80211-skip-mcs.patch
    # We tell it which folder in the kernel source to build
    source-dir: net/mac80211
